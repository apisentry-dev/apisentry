# This is an EXAMPLE workflow showing how to integrate APISentry.
# Copy this file into YOUR repo's .github/workflows/ and adjust the inputs.
# It is set to manual trigger only so it does not run in the APISentry repo itself.
name: API Security Scan (Example)

on:
  workflow_dispatch:  # manual trigger only — copy to your repo and adjust triggers

jobs:
  api-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write       # needed for PR comments
      security-events: write     # needed for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - name: APISentry API Security Scan
        uses: apisentry-dev/apisentry@v0.1.0
        with:
          spec-path: openapi.yaml          # path to your OpenAPI spec
          base-url: https://api.example.com
          token: ${{ secrets.API_TOKEN }}  # optional: your API bearer token
          severity-threshold: high         # fail PR if critical or high found
          format: sarif                    # uploads to GitHub Code Scanning
