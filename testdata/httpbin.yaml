openapi: "3.0.0"
info:
  title: httpbin
  version: "1.0"
servers:
  - url: https://httpbin.org
paths:
  /get:
    get:
      operationId: getGet
      parameters:
        - name: id
          in: query
          schema:
            type: integer
        - name: user_id
          in: query
          schema:
            type: integer
        - name: name
          in: query
          schema:
            type: string
        - name: url
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
  /post:
    post:
      operationId: postPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                role:
                  type: string
                url:
                  type: string
      responses:
        "200":
          description: OK
  /put:
    put:
      operationId: putPut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                isAdmin:
                  type: boolean
      responses:
        "200":
          description: OK
  /delete:
    delete:
      operationId: deleteDelete
      parameters:
        - name: id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /status/{code}:
    get:
      operationId: getStatus
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /anything/{id}:
    get:
      operationId: getAnything
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
    put:
      operationId: putAnything
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: string
      responses:
        "200":
          description: OK
  /bearer:
    get:
      operationId: getBearer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
  /basic-auth/{user}/{passwd}:
    get:
      operationId: getBasicAuth
      parameters:
        - name: user
          in: path
          required: true
          schema:
            type: string
        - name: passwd
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
