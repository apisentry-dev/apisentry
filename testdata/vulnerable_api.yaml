openapi: "3.0.0"
info:
  title: Vulnerable Test API
  version: "1.0"
paths:
  /users/{user_id}:
    get:
      summary: Get user by ID
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User object

  /admin/users/{user_id}:
    delete:
      summary: Delete user (admin only - but broken)
      operationId: deleteUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /secure/profile:
    get:
      summary: Get own profile (properly protected)
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile

  /users:
    get:
      summary: List all users
      operationId: listUsers
      responses:
        "200":
          description: Users list

  /users/update:
    post:
      summary: Update user data
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                name:
                  type: string
                role:
                  type: string
      responses:
        "200":
          description: Updated user

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
